<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<title>SmartLight</title>

	<link rel="stylesheet" href="./css/m3-theme.css">
	<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,150,0..1,-50..200&icon_names=android_wifi_3_bar,android_wifi_3_bar_off,bolt,help,home,light_off,lightbulb,menu,palette,settings,straighten,terminal_2,tune" />

	<script type="importmap">
		{
			"imports": {
				"@material/web/": "https://esm.run/@material/web/"
			}
		}
	</script>
	<script type="module">
		import '@material/web/all.js';
		import {styles as typescaleStyles} from '@material/web/typography/md-typescale-styles.js';

		document.adoptedStyleSheets.push(typescaleStyles.styleSheet);
	</script>	
	
</head>
<body>

	<!-- Header с лого -->
	<header class="m3-top-app-bar">
		<div class="m3-bar-section m3-bar-section--left">
			<button class="m3-bar-button">
				<span class="material-symbols-outlined">menu</span>
			</button>
		</div>
		<div class="m3-bar-section m3-bar-section--center">
			<div class="m3-logo-container">
				<div class="m3-logo-main">
					SmartLight
					<span class="m3-logo-version" id="logo-version">v2.2</span>
				</div>
				<div class="m3-logo-sub">by Krismas</div>
			</div>
		</div>
		<div class="m3-bar-section m3-bar-section--right">
			<md-icon-button toggle id="power-btn">
			<md-icon>lightbulb</md-icon>
			<md-icon slot="selected">light_off</md-icon>
			</md-icon-button>
		</div>
	</header>

	<!-- Main -->
	<main class="page-content">
		
		<!-- Блок статуса Wi-fi -->
		<div class="m3-card-container" style="display: flex; justify-content: center; align-items: center;">
			<md-outlined-button id="wifi-status" class="m3-wifi-status">
				<md-icon slot="icon">android_wifi_3_bar</md-icon>
				Подключено
			</md-outlined-button>
		</div>


		<!-- Блок выбора напряжения -->
		<div class="m3-card-container">
			<div class="m3-card-row">
				<!-- Иконка-->
				<md-filled-tonal-icon-button>
					<md-icon>bolt</md-icon>
				</md-filled-tonal-icon-button>
				<!-- Текст и подтекст -->
				<div class="m3-card-text-block">
					<div class="m3-card-text-block-title">Напряжение</div>
					<div class="m3-card-text-block-subtitle">Питание 5V или 12V</div>
				</div>
				<!-- Кнопка переключатель -->
				<div class="m3-voltage-btn" id="voltage-toggle-container">
					<md-outlined-button>5V</md-outlined-button>
				</div>
			</div>
		</div>


		<!-- Блок выбора шага кластеров -->
		<div class="m3-card-container">
			<div class="m3-card-row">
				<!-- Иконка-->
				<md-filled-tonal-icon-button>
					<md-icon>straighten</md-icon>
				</md-filled-tonal-icon-button>
				<!-- Текст и подтекст -->
				<div class="m3-card-text-block">
					<div class="m3-card-text-block-title">Пиксель</div>
					<div class="m3-card-text-block-subtitle">Шаг резки ленты</div>
				</div>
				<!-- Поле ввода -->
				<div class="m3-cluster-field" id="cluster-field-container">
					<md-outlined-text-field
					error-text="Ошибка"
					suffix-text="мм"
					value="5"
					></md-outlined-text-field>
				</div>
			</div>
		</div>

		<!-- Блок выбора типа ленты -->
		<div class="m3-card-container">
			<div class="m3-card-row">
				<!-- Иконка -->
				<md-filled-tonal-icon-button>
					<md-icon>palette</md-icon>
				</md-filled-tonal-icon-button>
				<!-- Текст и подтекст -->
				<div class="m3-card-text-block">
					<div class="m3-card-text-block-title">Тип кластера</div>
					<div class="m3-card-text-block-subtitle">Порядок цветов</div>
				</div>
				<!-- Поле выбора -->
				<div class="m3-rgb-selector" id="rgb-selector-container">
					<md-outlined-select>
						<md-select-option selected value="RGB">
							<div slot="headline">RGB</div>
						</md-select-option>
						<md-select-option value="RBG">
							<div slot="headline">RBG</div>
						</md-select-option>
					</md-outlined-select>
				</div>
			</div>
		</div>

		<!-- Блок ввода размеров -->
		<div class="m3-card-container">
			<div class="m3-card-row">
				<!-- Иконка -->
				<md-filled-tonal-icon-button>
					<md-icon>palette</md-icon>
				</md-filled-tonal-icon-button>
				<!-- Текст и подтекст -->
				<div class="m3-card-text-block">
					<div class="m3-card-text-block-title">Размер</div>
					<div class="m3-card-text-block-subtitle">Длина и ширина рисунка</div>
				</div>
				<md-icon-button>
					<md-icon>help</md-icon>
				</md-icon-button>
			</div>
			<div class="m3-card-row">
				<div class="m3-fields-row">
					<md-outlined-text-field
						label="Длина"
						error-text="Не кратно шагу резки"
						suffix-text="мм"
						value="5"
					></md-outlined-text-field>
					<md-outlined-text-field
						error
						label="Ширина"
						error-text="Не кратно шагу резки"
						suffix-text="мм"
						value="5"
					></md-outlined-text-field>
				</div>
			</div>
		</div>



		<div class="m3-card-container" style="padding: 16px; display: flex; justify-content: center;">
			<!-- Подключаем независимый SVG-компонент -->
			<object type="image/svg+xml" data="./components/anim1/anim1.svg" width="350" height="175"></object>
		</div>

	</main>

	<!-- Navigation -->
	<nav class="m3-nav-bar">
		<button class="m3-nav-item m3-nav-item--active">
			<div class="m3-icon-wrapper">
				<span class="material-symbols-outlined">home</span>
			</div>
			<span class="m3-label">Главная</span>
		</button>
		<button class="m3-nav-item">
			<div class="m3-icon-wrapper">
				<span class="material-symbols-outlined">tune</span>
			</div>
			<span class="m3-label">Настройки</span>
		</button>
		<button class="m3-nav-item">
			<div class="m3-icon-wrapper">
				<span class="material-symbols-outlined">settings</span>
			</div>
			<span class="m3-label">Установки</span>
		</button>
		<button class="m3-nav-item">
			<div class="m3-icon-wrapper">
				<span class="material-symbols-outlined">terminal_2</span>
			</div>
			<span class="m3-label">Консоль</span>
		</button>
	</nav>

	<script type="module" src="./js/app.js"></script>
</body>
</html>
