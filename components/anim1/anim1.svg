<?xml version="1.0" encoding="utf-8"?>
<?xml-stylesheet type="text/css" href="./anim1.css" ?>
<svg viewBox="0 0 350 175" xmlns="http://www.w3.org/2000/svg">

  <!-- Базовый тусклый контур (всегда виден как подсказка) -->
  <path class="base-path"
    d="M 67.96,12.93 L 279.96,12.93 L 214.79,76.54 L 132.96,76.54 Z"
    fill="none" stroke="#ffffff" stroke-width="2" opacity="0.02"/>

  <!-- anim-01 / anim-02: контур целиком -->
  <path class="full-path"
    d="M 67.96,12.93 L 279.96,12.93 L 214.79,76.54 L 132.96,76.54 Z"
    fill="none" stroke="#ffffff" stroke-width="3"/>

  <!-- anim-03 / anim-04: плавный розжиг после пикселя -->
  <path class="glow-path"
    d="M 67.96,12.93 L 279.96,12.93 L 214.79,76.54 L 132.96,76.54 Z"
    fill="none" stroke="#ffffff" stroke-width="3"/>

  <!-- anim-04: хвост от стартовой точки -->
  <path class="tail-path"
    d="M 67.96,12.93 L 279.96,12.93 L 214.79,76.54 L 132.96,76.54 Z"
    fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round"
    stroke-dasharray="0 476" stroke-dashoffset="0"/>

  <!-- anim-03 / anim-04: одиночный пиксель -->
  <path class="pixel-path"
    d="M 67.96,12.93 L 279.96,12.93 L 214.79,76.54 L 132.96,76.54 Z"
    fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round"
    stroke-dasharray="6 476" stroke-dashoffset="0"/>

  <!-- anim-05: пиксель А (быстрый, длинный путь 303px) -->
  <path class="pixel-a-path"
    d="M 67.96,12.93 L 279.96,12.93 L 214.79,76.54 L 132.96,76.54 Z"
    fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round"
    stroke-dasharray="6 476" stroke-dashoffset="0"/>

  <!-- anim-05: пиксель Б (медленный, короткий путь 173px) -->
  <path class="pixel-b-path"
    d="M 67.96,12.93 L 279.96,12.93 L 214.79,76.54 L 132.96,76.54 Z"
    fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round"
    stroke-dasharray="6 476" stroke-dashoffset="-476"/>

  <!-- anim-06: волна (тёмная полоса скользит по горящему контуру) -->
  <path class="wave-path"
    d="M 67.96,12.93 L 279.96,12.93 L 214.79,76.54 L 132.96,76.54 Z"
    fill="none" stroke="#000000" stroke-width="6" stroke-linecap="round"
    stroke-dasharray="60 416" stroke-dashoffset="0"/>

</svg>